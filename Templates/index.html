<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KMS - Key Management System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { border: 1px solid #ccc; padding: 20px; max-width: 500px; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, button { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="container">
        <h2>File Encryption (OpenSSL)</h2>

        {% if message %}
            <p style="color: green;"><b>{{ message }}</b></p>
        {% endif %}

        <form action="/encrypt" method="POST" enctype="multipart/form-data">

            <div class="form-group">
                <label for="file">Choose File:</label>
                <input type="file" name="file" id="file" required>
            </div>

            <div class="form-group">
                <label for="algorithm">Select Algorithm:</label>
                <select name="algorithm_id" id="algorithm" required>
                    {% for alg in algorithms %}
                        <option value="{{ alg.id }}">{{ alg.name }} ({{ alg.type }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="framework">Select Framework:</label>
                <select name="framework_id" id="framework" required>
                    {% for fw in frameworks %}
                        <option value="{{ fw.id }}">{{ fw.name }} {{ fw.version }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit">Encrypt and Save to DB</button>
        </form>
    </div>

</body>
</html>
